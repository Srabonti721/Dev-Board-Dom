<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Board Dom</title>
    <!-- font poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .font-poppins {
            font-family: "Poppins", sans-serif;
        }

        .text-color {
            color: #00303C;
        }
    </style>
</head>

<body class="font-poppins">
    <header class="py-5 px-2">
        <div class="navbar bg-base-100 shadow-sm rounded-lg">
            <div class="navbar-start">
                <img src="assets/logo.png" alt="dev logo">
                <h1 class="text-3xl px-2">Dev <span class="text-color font-bold">Board</span></h1>
            </div>
            <div class="navbar-end ">
                <div class="flex justify-center items-center p-2 bg-gray-200 rounded-full">
                    <img src="assets/checkbox.png" alt="">
                    <h3 class="text-xl px-2 ">23</h3>
                </div>
                <img class="mx-4 p-2 bg-gray-200 rounded-full" src="assets/theme-btn.png" alt="">
            </div>
        </div>
    </header>

</body>

</html>
